            - TestViewOps::test_view_as_complex   # NotImplementedError aten::normal_ https://github.com/torch-spyre/torch-spyre/issues/651 & Complex Not supported TODO:UPDATE!
            - TestViewOps::test_view_as_real  # Complex not supported https://github.com/torch-spyre/torch-spyre/issues/652
            - TestViewOps::test_view_as_view   # NotImplementedError as_strided https://github.com/torch-spyre/torch-spyre/issues/687 TODO:UPDATE!
            - TestViewOps::test_view_copy_out #TODO:CREATE ISSUE
            - TestViewOps::test_view_copy_output_contiguous   # NotImplementedError aten::normal_ https://github.com/torch-spyre/torch-spyre/issues/651 TODO:UPDATE!
            - TestViewOps::test_view_copy   # NotImplementedError aten::normal_ https://github.com/torch-spyre/torch-spyre/issues/651 TODO:UPDATE!
            - TestViewOps::test_view_tensor_dsplit   # corrupted size vs. prev_size https://github.com/torch-spyre/torch-spyre/issues/676
            - TestViewOps::test_view_tensor_hsplit   # Fatal Python error: Segmentation fault https://github.com/torch-spyre/torch-spyre/issues/674 TODO:UPDATE!
            - TestViewOps::test_view_tensor_vsplit   # corrupted size vs. prev_size https://github.com/torch-spyre/torch-spyre/issues/675 TODO:UPDATE!
            - TestViewOps::test_view_view   # NotImplementedError as_strided https://github.com/torch-spyre/torch-spyre/issues/687 TODO:UPDATE!
          mode: skip

  global:
    supported_dtypes:
      - name: float16
      - name: int64
    supported_ops:
      - name: add
        dtypes:
          - name: float16
            precision:
              atol: 1e-3
              rtol: 1e-3
          - name: int64
      - name: mul
      - name: sub
      - name: gcd
        force_xfail: true
